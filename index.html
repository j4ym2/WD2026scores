<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Final Scores</title>
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #e0e1dd;
            --text: #ffffff;
            --card-bg: #415a77;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .stage-section {
            margin-bottom: 40px;
        }
        .stage-title {
            background-color: var(--secondary);
            padding: 10px 20px;
            border-radius: 6px;
            border-left: 5px solid #778da9;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .match-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .match-status {
            font-size: 0.8rem;
            text-align: center;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 5px 0;
            font-size: 1.1rem;
        }
        .team-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .team-flag {
            width: 24px;
            height: 16px;
            object-fit: cover;
            border-radius: 2px;
            background: #fff;
        }
        .score {
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 20px;
            text-align: center;
        }
        .loading, .error {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
        }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>

    <header>
        <h1>🏆 World Cup Final Scores</h1>
    </header>

    <div id="content">
        <div class="loading">Loading World Cup scores via secure proxy...</div>
    </div>

    <script>
        const WORKER_URL = 'https://wc2026jmz.jamesfares.workers.dev/';

        document.addEventListener("DOMContentLoaded", () => {
            fetchWorldCupData();
        });

        async function fetchWorldCupData() {
            const contentDiv = document.getElementById('content');

            try {
                const response = await fetch(WORKER_URL);

                if (!response.ok) {
                    throw new Error(`Worker Error: ${response.status} - ${response.statusText}`);
                }

                const data = await response.json();
                renderMatches(data.matches);

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <p>Error loading tournament data from Cloudflare Worker.</p>
                        <small>${error.message}</small>
                    </div>`;
            }
        }

        function renderMatches(matches) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = ''; 

            if (!matches || matches.length === 0) {
                contentDiv.innerHTML = '<div class="loading">No matches found for this tournament.</div>';
                return;
            }

            // 1. Reverse the entire match array so individual games run newest-first
            matches.reverse();

            const stages = {};
            matches.forEach(match => {
                let stageName = match.stage.replace(/_/g, ' ');
                if (match.group) {
                    stageName += ` - ${match.group.replace(/_/g, ' ')}`;
                }

                if (!stages[stageName]) {
                    stages[stageName] = [];
                }
                stages[stageName].push(match);
            });

            // 2. Render groups. Because we reversed the array, advanced stages
            // (like FINAL, SEMI_FINALS) naturally process and render at the top.
            for (const [stage, stageMatches] of Object.entries(stages)) {
                const stageSection = document.createElement('div');
                stageSection.className = 'stage-section';

                const title = document.createElement('h2');
                title.className = 'stage-title';
                title.textContent = stage;
                stageSection.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'matches-grid';

                stageMatches.forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'match-card';

                    const homeScore = match.score.fullTime.home !== null ? match.score.fullTime.home : '-';
                    const awayScore = match.score.fullTime.away !== null ? match.score.fullTime.away : '-';
                    
                    let penaltyString = "";
                    if (match.score.penalties && match.score.penalties.home !== null) {
                        penaltyString = ` (Pens: ${match.score.penalties.home}-${match.score.penalties.away})`;
                    }

                    const homeFlag = match.homeTeam.crest ? `<img class="team-flag" src="${match.homeTeam.crest}" alt="">` : '';
                    const awayFlag = match.awayTeam.crest ? `<img class="team-flag" src="${match.awayTeam.crest}" alt="">` : '';

                    card.innerHTML = `
                        <div class="match-status">${match.status}${penaltyString}</div>
                        <div class="team-row">
                            <span class="team-name">${homeFlag} ${match.homeTeam.shortName || match.homeTeam.name || 'TBD'}</span>
                            <span class="score">${homeScore}</span>
                        </div>
                        <div class="team-row">
                            <span class="team-name">${awayFlag} ${match.awayTeam.shortName || match.awayTeam.name || 'TBD'}</span>
                            <span class="score">${awayScore}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                stageSection.appendChild(grid);
                contentDiv.appendChild(stageSection);
            }
        }
    </script>
</body>
</html>
